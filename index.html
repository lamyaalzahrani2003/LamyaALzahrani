<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="container">
      <div class="todo-list">
        <div class="title">
          <h2>To Do List</h2>
        </div><!--title-->

        <div class="row">
          <input type="text" id="input-task" placeholder="Enter a task">
          <button class="btn">Add</button>
        </div><!--row-->

        <ul id="task-list">
          <!-- العناصر تضاف ديناميكياً -->
        </ul>
      </div><!--todolist-->
    </div><!--container-->
  </main>

  <script src="script.js"></script>
</body>
</html>
